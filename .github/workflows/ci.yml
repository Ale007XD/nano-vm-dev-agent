name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run CI on"
        required: true
        default: "main"
        type: string
      python_versions:
        description: "Python versions (comma-separated)"
        required: false
        default: "3.10,3.11,3.12"
        type: string
      skip_mypy:
        description: "Skip mypy type check"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    outputs:
      python-matrix: ${{ steps.set.outputs.matrix }}
      ref:           ${{ steps.set.outputs.ref }}
      skip_mypy:     ${{ steps.set.outputs.skip_mypy }}

    steps:
      - name: Build matrix and ref
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.branch }}"
            VERSIONS="${{ inputs.python_versions }}"
            SKIP_MYPY="${{ inputs.skip_mypy }}"
          else
            REF="${{ github.ref_name }}"
            VERSIONS="3.10,3.11,3.12"
            SKIP_MYPY="false"
          fi

          MATRIX=$(echo "$VERSIONS" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          versions = [v.strip() for v in raw.split(',') if v.strip()]
          print(json.dumps(versions or ['3.12']))
          ")

          echo "matrix=$MATRIX"     >> "$GITHUB_OUTPUT"
          echo "ref=$REF"           >> "$GITHUB_OUTPUT"
          echo "skip_mypy=$SKIP_MYPY" >> "$GITHUB_OUTPUT"

          echo "### CI targets"                        >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`$REF\`"                >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** \`$VERSIONS\`"           >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skip mypy:** \`$SKIP_MYPY\`"       >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    needs: resolve

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

      - name: Mypy
        if: ${{ needs.resolve.outputs.skip_mypy != 'true' }}
        run: python -m mypy agent/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [resolve, lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.resolve.outputs.python-matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (unit only — no real LLM calls)
        env:
          # Ensure no provider key leaks into CI — tests must use MockLLMAdapter
          VIBECODE_API_KEY: ""
          OPENROUTER_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: |
          pytest \
            --timeout=30 \
            -v \
            -m "not integration" \
            tests/
