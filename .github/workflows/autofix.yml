name: Autofix

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  ruff-fix:
    name: Ruff --fix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token with write access so the commit triggers CI on the branch
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff --fix
        run: python -m ruff check --fix .

      - name: Commit fixes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No fixes needed" && exit 0
          git add -A
          git commit -m "style: ruff --fix [skip ci]"
          git push
